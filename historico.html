<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Histórico — Central de Solicitações — SeuBoné</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="brand-mark">SB</div>
    <div>
      <h1>Central de Solicitações</h1>
      <div class="sub">Histórico e indicadores</div>
    </div>
  </div>
  <nav>
    <a href="index.html">Central</a>
    <a href="historico.html" class="active">Histórico</a>
  </nav>
</div>

<div class="container">

  <!-- Indicadores -->
  <div class="stats">
    <div class="stat"><div class="n" id="st-total">-</div><div class="l">solicitações no período</div></div>
    <div class="stat ok"><div class="n" id="st-pct">-</div><div class="l">% já concluído</div></div>
    <div class="stat"><div class="n" id="st-tempo">-</div><div class="l">tempo médio até concluir (dias)</div></div>
  </div>

  <!-- Filtros -->
  <div class="filters">
    <div>
      <label>De</label>
      <input type="date" id="ft-de">
    </div>
    <div>
      <label>Até</label>
      <input type="date" id="ft-ate">
    </div>
    <div>
      <label>Status</label>
      <select id="ft-status">
        <option value="">Todos</option>
        <option value="Pendente">Pendentes</option>
        <option value="Feito">Feitos</option>
      </select>
    </div>
    <div>
      <label>Tipo de demanda</label>
      <select id="ft-tipo">
        <option value="">Todos</option>
        <option>Nota fiscal</option>
        <option>Reembolso</option>
        <option>Pagamento</option>
        <option>Outras demandas</option>
      </select>
    </div>
    <div>
      <label>Buscar (solicitante ou ID da compra)</label>
      <input type="text" id="ft-busca" placeholder="Digite pra filtrar">
    </div>
    <div>
      <button class="btn-toggle" id="btn-filtrar">Filtrar</button>
    </div>
  </div>

  <!-- Tabela -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Data</th>
          <th>ID compra</th>
          <th>Card</th>
          <th>Solicitante</th>
          <th>Tipo</th>
          <th>Observação</th>
          <th>Status</th>
          <th>Feito por</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none">Nenhuma solicitação encontrada no período.</div>
  </div>

</div>

<script src="config.js"></script>
<script>
let solicitacoes = [];

function formatarData(iso) {
  if (!iso) return '';
  const partes = iso.slice(0, 10).split('-');
  return partes[2] + '/' + partes[1] + '/' + partes[0];
}

function escapeHtml(str) {
  if (str === undefined || str === null) return '';
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

async function carregar() {
  try {
    const resp = await fetch(APP_URL + '?action=list');
    const data = await resp.json();
    if (data.erro) throw new Error(data.erro);
    solicitacoes = data;
    renderizar();
  } catch (err) {
    console.error(err);
  }
}

function renderizar() {
  const de = document.getElementById('ft-de').value;
  const ate = document.getElementById('ft-ate').value;
  const statusFiltro = document.getElementById('ft-status').value;
  const tipoFiltro = document.getElementById('ft-tipo').value;
  const busca = document.getElementById('ft-busca').value.trim().toLowerCase();

  let lista = solicitacoes.filter(s => {
    const dataSol = (s.Data || '').slice(0, 10);
    if (de && dataSol < de) return false;
    if (ate && dataSol > ate) return false;
    if (statusFiltro && s.Status !== statusFiltro) return false;
    if (tipoFiltro && s.TipoDemanda !== tipoFiltro) return false;
    if (busca) {
      const alvo = (s.Solicitante + ' ' + s.IDCompra).toLowerCase();
      if (!alvo.includes(busca)) return false;
    }
    return true;
  });

  // KPIs
  const total = lista.length;
  const feitos = lista.filter(s => s.Status === 'Feito');
  const pct = total ? Math.round((feitos.length / total) * 100) : 0;

  let tempoMedio = '-';
  const comTempo = feitos.filter(s => s.InseridoEm && s.FeitoEm);
  if (comTempo.length) {
    const somaDias = comTempo.reduce((acc, s) => {
      const dias = (new Date(s.FeitoEm) - new Date(s.InseridoEm)) / (1000 * 60 * 60 * 24);
      return acc + dias;
    }, 0);
    tempoMedio = (somaDias / comTempo.length).toFixed(1);
  }

  document.getElementById('st-total').textContent = total;
  document.getElementById('st-pct').textContent = total ? pct + '%' : '-';
  document.getElementById('st-tempo').textContent = tempoMedio;

  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('empty');

  // mais recente primeiro
  lista = lista.slice().sort((a, b) => new Date(b.InseridoEm) - new Date(a.InseridoEm));

  if (lista.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = lista.map(s => `
    <tr>
      <td>${formatarData(s.Data)}</td>
      <td>${escapeHtml(s.IDCompra)}</td>
      <td>${s.LinkCard ? `<a href="${escapeHtml(s.LinkCard)}" target="_blank" rel="noopener">abrir card</a>` : '—'}</td>
      <td>${escapeHtml(s.Solicitante)}</td>
      <td>${escapeHtml(s.TipoDemanda)}</td>
      <td>${escapeHtml(s.Observacao) || '—'}</td>
      <td><span class="badge ${s.Status === 'Feito' ? 'ok' : 'warn'}">${s.Status}</span></td>
      <td>${escapeHtml(s.FeitoPor) || '—'}</td>
      <td><button class="btn-toggle ${s.Status === 'Feito' ? 'pendente' : 'feito'}" onclick="alternarStatus('${s.ID}', '${s.Status}')">
        ${s.Status === 'Feito' ? 'Marcar pendente' : 'Marcar feito'}
      </button></td>
    </tr>
  `).join('');
}

async function alternarStatus(id, statusAtual) {
  const novoStatus = statusAtual === 'Feito' ? 'Pendente' : 'Feito';
  let marcadoPor = '';
  if (novoStatus === 'Feito') {
    marcadoPor = prompt('Seu nome (quem está marcando como feito):') || '';
    if (!marcadoPor) return;
  }
  try {
    const resp = await fetch(APP_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'marcar', id: id, status: novoStatus, marcadoPor: marcadoPor })
    });
    const data = await resp.json();
    if (!data.ok) throw new Error(data.erro || 'erro ao atualizar');
    carregar();
  } catch (err) {
    alert('Erro ao atualizar status: ' + err.message);
  }
}

document.getElementById('btn-filtrar').addEventListener('click', renderizar);
document.getElementById('ft-status').addEventListener('change', renderizar);
document.getElementById('ft-tipo').addEventListener('change', renderizar);
document.getElementById('ft-busca').addEventListener('input', renderizar);

carregar();
setInterval(carregar, 20000);
</script>

</body>
</html>
