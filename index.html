<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central de Solicitações — SeuBoné</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="brand-mark">SB</div>
    <div>
      <h1>Central de Solicitações</h1>
      <div class="sub">Pedidos para outros setores — visível pra todo mundo</div>
    </div>
  </div>
  <nav>
    <a href="index.html" class="active">Central</a>
    <a href="historico.html">Histórico</a>
  </nav>
</div>

<div class="container">

  <!-- Formulário de nova solicitação -->
  <div class="card">
    <h2>Nova solicitação</h2>
    <div class="card-sub">Preencha e clique em registrar. Acompanhe o andamento na aba Histórico.</div>

    <div class="row3">
      <div>
        <label>Data *</label>
        <input type="date" id="f-data">
      </div>
      <div>
        <label>ID da compra *</label>
        <input type="text" id="f-idcompra" placeholder="Ex: 4521">
      </div>
      <div>
        <label>Quem solicitou *</label>
        <input type="text" id="f-solicitante" placeholder="Seu nome">
      </div>
    </div>

    <div class="row2">
      <div>
        <label>Tipo de demanda *</label>
        <select id="f-tipo">
          <option value="">Selecione</option>
          <option>Nota fiscal</option>
          <option>Reembolso</option>
          <option>Pagamento</option>
          <option>Outras demandas</option>
        </select>
      </div>
      <div>
        <label>Link do card</label>
        <input type="text" id="f-link" placeholder="https://...">
      </div>
    </div>

    <label>Observação — opcional</label>
    <textarea id="f-obs" rows="2" placeholder="Detalhe algo se precisar"></textarea>

    <label>Anexos — opcional</label>
    <input type="file" id="f-anexos" multiple>
    <div class="card-sub" style="margin-top:6px;">Pode selecionar mais de um arquivo. Prefira arquivos de até 5 MB cada.</div>

    <button class="btn-primary" id="btn-registrar">Registrar solicitação</button>
    <div class="msg" id="form-msg"></div>
  </div>

</div>

<script src="config.js"></script>
<script>
function hoje() {
  const d = new Date();
  return d.toISOString().slice(0, 10);
}
document.getElementById('f-data').value = hoje();

function mostrarMsg(texto, tipo) {
  const el = document.getElementById('form-msg');
  el.textContent = texto;
  el.className = 'msg ' + tipo;
  setTimeout(() => { el.className = 'msg'; }, 4000);
}

function lerArquivoBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve({ nome: file.name, tipo: file.type, base64: reader.result.split(',')[1] });
    reader.onerror = () => reject(new Error('Não consegui ler o arquivo ' + file.name));
    reader.readAsDataURL(file);
  });
}

document.getElementById('btn-registrar').addEventListener('click', async () => {
  const idCompra = document.getElementById('f-idcompra').value.trim();
  const solicitante = document.getElementById('f-solicitante').value.trim();
  const tipoDemanda = document.getElementById('f-tipo').value;
  const linkCard = document.getElementById('f-link').value.trim();
  const observacao = document.getElementById('f-obs').value.trim();
  const data = document.getElementById('f-data').value;
  const inputAnexos = document.getElementById('f-anexos');
  const arquivos = Array.from(inputAnexos.files);

  if (!idCompra || !solicitante || !tipoDemanda) {
    mostrarMsg('Preencha data, ID da compra, solicitante e tipo de demanda.', 'err');
    return;
  }

  const tamanhoTotal = arquivos.reduce((soma, f) => soma + f.size, 0);
  if (tamanhoTotal > 20 * 1024 * 1024) {
    mostrarMsg('Os anexos somados passam de 20 MB. Envie arquivos menores.', 'err');
    return;
  }

  const btn = document.getElementById('btn-registrar');
  btn.disabled = true;
  btn.textContent = arquivos.length ? 'Enviando anexos...' : 'Registrando...';

  try {
    const anexos = arquivos.length ? await Promise.all(arquivos.map(lerArquivoBase64)) : [];

    btn.textContent = 'Registrando...';
    const resp = await fetch(APP_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'create', data, idCompra, solicitante, tipoDemanda, linkCard, observacao, anexos })
    });
    const result = await resp.json();
    if (!result.ok) throw new Error(result.erro || 'erro ao registrar');

    mostrarMsg('Solicitação registrada!', 'ok');
    document.getElementById('f-idcompra').value = '';
    document.getElementById('f-solicitante').value = '';
    document.getElementById('f-tipo').value = '';
    document.getElementById('f-link').value = '';
    document.getElementById('f-obs').value = '';
    document.getElementById('f-data').value = hoje();
    inputAnexos.value = '';
  } catch (err) {
    mostrarMsg('Erro: ' + err.message, 'err');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Registrar solicitação';
  }
});
</script>

</body>
</html>
